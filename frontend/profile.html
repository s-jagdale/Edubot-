<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — EduBot</title>
  <script>(function(){if(localStorage.getItem('darkMode')==='1')document.documentElement.classList.add('dark');})();</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { justify-content: flex-start; padding: 0; overflow: auto; }
    .profile-page-nav {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 32px;
      background: var(--navbar-bg);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky; top: 0; z-index: 100;
    }
    .profile-page-nav a {
      color: rgba(255,255,255,0.85); text-decoration: none;
      font-family: var(--font-display); font-size: 14px; font-weight: 600;
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; border-radius: var(--radius-xs);
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      transition: all var(--transition);
    }
    .profile-page-nav a:hover { background: rgba(255,255,255,0.18); }
    .profile-brand {
      font-family: var(--font-display); font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg,#fff,rgba(165,180,252,0.85));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-right: auto;
    }
    .profile-page-nav::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(165,180,252,0.6), rgba(34,211,238,0.6), transparent);
    }
    .profile-page-nav { position: relative; }
  </style>
</head>
<body>

<nav class="profile-page-nav">
  <span class="profile-brand">EduBot</span>
  <a href="/"><i class="fa-solid fa-comments"></i> Chat</a>
  <button onclick="toggleDarkMode()" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:8px;width:36px;height:36px;cursor:pointer;color:white;font-size:14px;display:flex;align-items:center;justify-content:center;" title="Toggle Dark Mode">
    <i class="fa-solid fa-moon" id="dark-icon"></i>
  </button>
</nav>

<div class="profile-container">
  <div class="profile-avatar" id="avatar">S</div>
  <h1>User Profile</h1>
  <div class="profile-item"><span>Name:</span> <span id="name"></span></div>
  <div class="profile-item"><span>Email:</span> <span id="email"></span></div>
  <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> &nbsp;Logout</button>
</div>

<script>
function toggleDarkMode() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  const icon = document.getElementById('dark-icon');
  if (icon) icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}
window.addEventListener('DOMContentLoaded', function() {
  const icon = document.getElementById('dark-icon');
  if (icon && document.documentElement.classList.contains('dark'))
    icon.className = 'fa-solid fa-sun';
});
</script>
<script src="js/profile.js"></script>
</body>
</html>
